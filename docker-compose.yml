version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: USER_DB
      POSTGRES_PASSWORD: 2026DB
      POSTGRES_DB: contabilidad_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend-contabilidad
    container_name: backend-contabilidad
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=USER_DB
      - DB_PASS=2026DB
      - DB_NAME=contabilidad_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-contabilidad
    container_name: frontend-contabilidad
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Recuerda que para el cliente en el navegador, NEXT_PUBLIC_API_URL 
      # casi siempre apunta a la IP / dominio público (ej. 151.242.194.24)
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    restart: unless-stopped

volumes:
  pgdata:
